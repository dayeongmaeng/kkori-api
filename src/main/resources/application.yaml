spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kkori}
    username: ${SPRING_DATASOURCE_USERNAME:kkori}
    password: ${SPRING_DATASOURCE_PASSWORD:kkori@2026}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
    mapper:
      accept-case-insensitive-enums: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 2MB
      max-request-size: 5MB
aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
auth:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:2592000}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    kakao:
      rest-api-key: ${KAKAO_REST_API_KEY:}
      admin-key: ${KAKAO_ADMIN_KEY:}
    token:
      encryption-key: ${OAUTH_TOKEN_ENCRYPTION_KEY:}
