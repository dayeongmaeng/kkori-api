<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오 로그인</title>
</head>
<body>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var error = params.get('error');

    if (!code && !error) {
      return;
    }

    try {
      if (sessionStorage.getItem('pet-care:kakao:redirect-uri') !== null) {
        return;
      }
    } catch (e) {
      // sessionStorage 접근 실패 시 무시하고 계속 진행
    }

    var query = new URLSearchParams();
    if (code) query.set('code', code);
    if (error) query.set('error', error);

    location.replace('kkori://oauth/kakao?' + query.toString());
  })();
</script>
</body>
</html>
